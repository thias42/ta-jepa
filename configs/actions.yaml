# Phase 2b — action JEPA (learned latent actions + VQ bottleneck).
model:
  dim: 256
  enc_depth: 6
  pred_depth: 3
  heads: 4
  # Deliberately SMALL codebook — the key anti-leakage device (a few bits/step can't
  # encode the whole future). Sweep num_codes; watch diag/perplexity (index collapse if low).
  num_codes: 16
  code_dim: 32
  commitment_cost: 0.25
loss:
  var_coef: 1.0
  cov_coef: 0.04
  vq_coef: 1.0
  grounding_coef: 1.0
  entropy_coef: 0.1    # code-usage entropy bonus (push toward uniform usage)
train:
  lr: 2.0e-4
  weight_decay: 0.05
  base_momentum: 0.996
  window: 256
  batch_size: 32
  max_steps: 25000
